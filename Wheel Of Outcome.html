<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wheel of Outcome</title>

<style>

body{
background:#ff66a3;
font-family:Impact, Arial Black, sans-serif;
text-align:center;
color:white;
}

h1{
margin-top:20px;
}

#wheelContainer{
position:relative;
}

canvas{
border-radius:50%;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:20px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#pointer{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:30px solid white;
margin:auto;
}

#resultScreen{
display:none;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
}

#resultText{
font-size:70px;
color:black;
}

</style>
</head>

<body>

<h1 id="title">Wheel of  Outcomes</h1>

<div id="pointer"></div>

<div id="wheelContainer">
<canvas id="wheel" width="500" height="500"></canvas>
</div>

<br>
<button onclick="spin()">SPIN</button>

<div id="resultScreen">
<h1>Outcome</h1>
<div id="resultText"></div>
<p>This shows how unpredictable online exams can be.</p>
</div>

<script>

const options = [
"Perfect Upload",
"Power Cut",
"Barking Dog",
"Phone Notification",
"Noisy Neighbor",
"Internet Disruption"
];

const colors = [
"#ff0000",
"#ffcc00",
"#00cc66",
"#0099ff",
"#9933ff",
"#ff6600"
];

let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");

let arc = Math.PI * 2 / options.length;

function drawWheel(){

for(let i=0;i<options.length;i++){

let angle = i * arc;

ctx.beginPath();
ctx.fillStyle = colors[i];

ctx.moveTo(250,250);
ctx.arc(250,250,250,angle,angle+arc);
ctx.lineTo(250,250);
ctx.fill();

ctx.save();

ctx.translate(250,250);
ctx.rotate(angle + arc/2);

ctx.textAlign="center";
ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.font="bold 18px Impact";

ctx.fillText(options[i],160,5);

ctx.restore();
}
}

drawWheel();

function spin(){

let spinAngle = Math.floor(Math.random()*360 + 1440);

canvas.style.transition="transform 4s ease-out";
canvas.style.transform="rotate("+spinAngle+"deg)";

let result = options[Math.floor(Math.random()*options.length)];

setTimeout(()=>{

document.getElementById("wheelContainer").style.display="none";
document.getElementById("pointer").style.display="none";
document.querySelector("button").style.display="none";
document.getElementById("title").style.display="none";

let resultScreen = document.getElementById("resultScreen");
resultScreen.style.display="flex";

document.getElementById("resultText").innerText = result;

},4000);

}

</script>

</body>
</html>
